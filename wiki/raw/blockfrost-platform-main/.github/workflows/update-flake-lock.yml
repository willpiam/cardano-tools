name: Update flake.lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.LOCKFILE_UPDATE_APP_ID }}
          private-key: ${{ secrets.LOCKFILE_UPDATE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          branch: "chore/update-flake-lock"
          commit-msg: "chore(nix): update `flake.lock`"
          pr-title: "chore(nix): update `flake.lock`"
          pr-labels: dependencies,automated
          # A separate token, so the PR triggers CI recursively (the original `GITHUB_TOKEN` won’t).
          # Ref: https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
          token: ${{ steps.app-token.outputs.token }}
